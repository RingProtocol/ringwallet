name: Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit
